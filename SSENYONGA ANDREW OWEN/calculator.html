<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
        }

        .display {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }

        .display .previous {
            color: #888;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 5px;
        }

        .display .current {
            color: #fff;
            font-size: 36px;
            font-weight: 300;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .number {
            background: #2a2a4a;
            color: #fff;
        }

        .number:hover {
            background: #3a3a5a;
        }

        .operator {
            background: #4a4a6a;
            color: #fff;
        }

        .operator:hover {
            background: #5a5a7a;
        }

        .equals {
            background: #667eea;
            color: #fff;
            grid-column: span 2;
        }

        .equals:hover {
            background: #5568d3;
        }

        .clear {
            background: #e94560;
            color: #fff;
        }

        .clear:hover {
            background: #d63550;
        }

        .zero {
            grid-column: span 2;
        }

        .trig {
            background: #9b59b6;
            color: #fff;
            font-size: 16px;
        }

        .trig:hover {
            background: #8e44ad;
        }

        .constant {
            background: #3498db;
            color: #fff;
        }

        .constant:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous" id="previous"></div>
            <div class="current" id="current">0</div>
        </div>
        <div class="buttons">
            <button class="trig" onclick="sin()">sin</button>
            <button class="trig" onclick="cos()">cos</button>
            <button class="trig" onclick="tan()">tan</button>
            <button class="clear" onclick="clearAll()">AC</button>
            <button class="operator" onclick="clearEntry()">C</button>
            
            <button class="trig" onclick="asin()">asin</button>
            <button class="trig" onclick="acos()">acos</button>
            <button class="trig" onclick="atan()">atan</button>
            <button class="operator" onclick="percentage()">%</button>
            <button class="operator" onclick="setOperator('/')">÷</button>
            
            <button class="constant" onclick="pi()">π</button>
            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="setOperator('*')">×</button>
            
            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="setOperator('-')">−</button>
            <button class="constant" onclick="sqrt()">√</button>
            
            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="setOperator('+')">+</button>
            <button class="constant" onclick="pow()">x²</button>
            
            <button class="number zero" onclick="appendNumber('0')">0</button>
            <button class="number" onclick="appendDecimal()">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let current = '0';
        let previous = '';
        let operator = null;
        let shouldResetScreen = false;

        const currentDisplay = document.getElementById('current');
        const previousDisplay = document.getElementById('previous');

        function updateDisplay() {
            currentDisplay.textContent = current;
            if (operator) {
                previousDisplay.textContent = `${previous} ${operator}`;
            } else {
                previousDisplay.textContent = '';
            }
        }

        function appendNumber(num) {
            if (current === '0' || shouldResetScreen) {
                current = num;
                shouldResetScreen = false;
            } else {
                current += num;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetScreen) {
                current = '0.';
                shouldResetScreen = false;
            } else if (!current.includes('.')) {
                current += '.';
            }
            updateDisplay();
        }

        function setOperator(op) {
            if (operator && !shouldResetScreen) {
                calculate();
            }
            previous = current;
            operator = op;
            shouldResetScreen = true;
            updateDisplay();
        }

        function calculate() {
            if (!operator || shouldResetScreen) return;
            
            const prev = parseFloat(previous);
            const curr = parseFloat(current);
            let result;

            switch (operator) {
                case '+':
                    result = prev + curr;
                    break;
                case '-':
                    result = prev - curr;
                    break;
                case '*':
                    result = prev * curr;
                    break;
                case '/':
                    if (curr === 0) {
                        result = 'Error';
                    } else {
                        result = prev / curr;
                    }
                    break;
                default:
                    return;
            }

            current = result.toString();
            operator = null;
            previous = '';
            shouldResetScreen = true;
            updateDisplay();
        }

        function clearAll() {
            current = '0';
            previous = '';
            operator = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        function clearEntry() {
            current = '0';
            shouldResetScreen = false;
            updateDisplay();
        }

        function percentage() {
            current = (parseFloat(current) / 100).toString();
            updateDisplay();
        }

        function sin() {
            current = Math.sin(parseFloat(current)).toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        function cos() {
            current = Math.cos(parseFloat(current)).toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        function tan() {
            current = Math.tan(parseFloat(current)).toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        function asin() {
            const value = parseFloat(current);
            if (value < -1 || value > 1) {
                current = 'Error';
            } else {
                current = Math.asin(value).toString();
            }
            shouldResetScreen = true;
            updateDisplay();
        }

        function acos() {
            const value = parseFloat(current);
            if (value < -1 || value > 1) {
                current = 'Error';
            } else {
                current = Math.acos(value).toString();
            }
            shouldResetScreen = true;
            updateDisplay();
        }

        function atan() {
            current = Math.atan(parseFloat(current)).toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        function pi() {
            current = Math.PI.toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        function sqrt() {
            const value = parseFloat(current);
            if (value < 0) {
                current = 'Error';
            } else {
                current = Math.sqrt(value).toString();
            }
            shouldResetScreen = true;
            updateDisplay();
        }

        function pow() {
            const value = parseFloat(current);
            current = (value * value).toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendDecimal();
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') setOperator(e.key);
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') clearEntry();
        });
    </script>
</body>
</html>
